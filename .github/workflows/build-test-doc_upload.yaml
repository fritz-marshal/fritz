name: Build, test, and upload docs

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
jobs:
  build-test-doc:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    if: github.repository_owner == 'fritz-marshal' && github.event.pull_request.draft == false

    steps:
      - uses: actions/checkout@v6
        with:
          # skyportal-data (SFD dust maps + sncosmo models) is vendored as plain
          # git blobs in the submodule, so a recursive checkout pulls it in.
          submodules: recursive

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - uses: actions/setup-node@v6
        with:
          node-version: 22

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: skyportal/package.json

      - name: Setup Graphviz
        uses: ts-graphviz/setup-graphviz@v1

      - uses: actions/cache@v5
        with:
          path: |
            ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('skyportal/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      # The SFD dust maps and sncosmo SED models are now vendored in the
      # skyportal-data submodule (misc.dustmap_folder / sncosmo_data_folder) and
      # pulled via `lfs: true` above, so no separate download cache is needed.

      - name: Install system dependencies
        run: |
          sudo apt update -y && sudo apt install -y libcurl4-gnutls-dev libgnutls28-dev

      - name: Install dependencies
        run: |
          uv sync --inexact --group dev --group docs
          ./fritz develop

      - name: Lint sources
        run: |
          ./fritz lint

      - name: Build docs
        run: |
          source .venv/bin/activate
          uv pip install wheel
          uv sync --inexact --project skyportal --active
          ./fritz doc --yes

      - name: Deploy docs
        if: github.ref == 'refs/heads/main'
        uses: JamesIves/github-pages-deploy-action@v4.6.1
        with:
          folder: doc/_build/html
          repository-name: fritz-marshal/doc
          branch: main
          ssh-key: ${{ secrets.CI_DEPLOY_KEY }}
